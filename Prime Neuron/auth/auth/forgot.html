<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <title>UniFind • Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/common.css" />
  </head>
  <body>
    <div class="app-bg-orbit"></div>

    <div class="auth-shell page-enter">
      <div class="auth-hero">
        <div>
          <div class="app-logo-wrap">
            <div class="app-logo-circle"></div>
            <div class="app-logo-text">
              <span>UniFind</span>
              <span>Parul University Lost &amp; Found</span>
            </div>
          </div>
          <div style="margin-top: 32px; max-width: 360px">
            <h1 class="h1">Reset access securely.</h1>
            <p class="text-muted">
              This is a UI-only flow. Once backend is connected, a secure reset
              link will be emailed to your official ID.
            </p>
          </div>
        </div>
      </div>

      <div class="auth-panel glass-card">
        <div class="form-card">
          <h2 class="h2">Forgot password</h2>
          <p class="text-muted">
            Enter your official university email; a simulated reset notice will
            appear.
          </p>

          <form id="forgot-form" class="form-grid" style="margin-top: 18px">
            <div class="form-field" style="grid-column: 1 / -1">
              <label class="form-label">University email</label>
              <input
                type="email"
                class="form-input"
                id="forgot-email"
                placeholder="you@paruluniversity.ac.in"
                required
              />
            </div>

            <div style="grid-column: 1 / -1; margin-top: 6px">
              <button type="submit" class="btn btn-primary btn-full">
                Send reset link (demo)
              </button>
            </div>

            <div
              style="
                grid-column: 1 / -1;
                text-align: center;
                margin-top: 8px;
                font-size: 0.82rem;
              "
            >
              <a
                href="./login.html"
                style="color: var(--color-primary); text-decoration: none"
                >Back to login</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../scripts/storage.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../scripts/forgot.js"></script>
  </body>
</html>
