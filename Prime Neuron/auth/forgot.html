<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <title>UniFind • Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/common.css" />
  </head>
  <body>
    <div class="app-bg-orbit"></div>

    <div class="auth-shell page-enter">
      <div class="auth-hero">
        <div>
          <div class="app-logo-wrap">
            <div class="app-logo-circle"></div>
            <div class="app-logo-text">
              <span>UniFind</span>
              <span>Parul University Lost &amp; Found</span>
            </div>
          </div>
          <div style="margin-top: 32px; max-width: 380px">
            <h1 class="h1">Join the PrimeNeuron network.</h1>
            <p class="text-muted">
              Register once with your official campus identity to start
              reporting, finding, and claiming items digitally.
            </p>
          </div>
        </div>
      </div>

      <div class="auth-panel glass-card">
        <div class="form-card">
          <h2 class="h2">Create account</h2>
          <p class="text-muted">All fields are required for verification.</p>

          <form
            id="register-form"
            class="form-grid"
            style="margin-top: 18px"
            autocomplete="off"
          >
            <div class="form-field">
              <label class="form-label">Full name</label>
              <input
                type="text"
                class="form-input"
                id="reg-name"
                required
                placeholder="Akash Raj Purohit"
              />
            </div>

            <div class="form-field">
              <label class="form-label">Phone number</label>
              <input
                type="tel"
                class="form-input"
                id="reg-phone"
                required
                placeholder="+91-9XXXXXXXXX"
              />
            </div>

            <div class="form-field">
              <label class="form-label">University</label>
              <input
                type="text"
                class="form-input"
                id="reg-university"
                required
                value="Parul University"
              />
            </div>

            <div class="form-field">
              <label class="form-label">Enrollment number</label>
              <input
                type="text"
                class="form-input"
                id="reg-enrollment"
                required
                placeholder="PU-XXXX-XXXX"
              />
            </div>

            <div class="form-field">
              <label class="form-label">Age</label>
              <input
                type="number"
                class="form-input"
                id="reg-age"
                min="16"
                max="80"
                required
              />
            </div>

            <div class="form-field">
              <label class="form-label">Username</label>
              <input
                type="text"
                class="form-input"
                id="reg-username"
                required
                placeholder="prime.neuron"
              />
            </div>

            <div class="form-field">
              <label class="form-label">University email</label>
              <input
                type="email"
                class="form-input"
                id="reg-email"
                required
                placeholder="you@paruluniversity.ac.in"
              />
            </div>

            <div class="form-field">
              <label class="form-label">Password</label>
              <input
                type="password"
                class="form-input"
                id="reg-password"
                required
                minlength="6"
              />
            </div>

            <div class="form-field" style="grid-column: 1 / -1">
              <label class="form-label">Profile photo</label>
              <input
                type="file"
                id="reg-photo"
                accept="image/*"
                class="form-input"
              />
              <div
                id="reg-photo-preview"
                style="
                  margin-top: 10px;
                  display: flex;
                  align-items: center;
                  gap: 12px;
                  font-size: 0.8rem;
                "
              ></div>
            </div>

            <div style="grid-column: 1 / -1; margin-top: 6px">
              <button type="submit" class="btn btn-primary btn-full">
                Create account
              </button>
            </div>

            <div
              style="
                grid-column: 1 / -1;
                text-align: center;
                margin-top: 8px;
                font-size: 0.82rem;
              "
            >
              <span class="text-muted">
                Already registered?
                <a
                  href="./login.html"
                  style="color: var(--color-primary); text-decoration: none"
                  >Back to login</a
                >
              </span>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../scripts/storage.js"></script>
    <script src="../scripts/authService.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../scripts/register.js"></script>
  </body>
</html>
